# MODE: LOKAL (offline-capable). APK ini membundle isi folder www/
# LANGSUNG di dalamnya — jadi setiap kali kamu ubah www/index.html dan mau
# user dapat APK dengan tampilan baru, kamu HARUS:
#   1. Push perubahan www/ ke GitHub (workflow ini otomatis jalan)
#   2. Tunggu build selesai di tab Actions
#   3. Download APK baru dari Artifacts, lalu install ulang di HP
# (Cukup install ulang di atas APK lama, tidak perlu uninstall dulu —
# data app akan tetap ada selama appId/versi sama.)
#
# docs/ TIDAK memicu build APK (lihat paths-ignore di bawah) karena docs/
# hanya dipakai untuk GitHub Pages (web version + version.json untuk
# auto-update checker di dalam APK).
name: Build Android APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Generate app icons and splash screen
        run: npx capacitor-assets generate --android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rc-engine-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
